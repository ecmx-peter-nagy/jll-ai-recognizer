# -------------------------------------------
# OKTA Authentication Configuration
# -------------------------------------------
# The endpoint for requesting an OAuth token
okta.token.url=https://api-qa.jll.com/okta/token
okta.scope=clientcredential

# -------------------------------------------
# Gemini Chat Service Configuration
# -------------------------------------------
# The base URL for the JLL chat service middleware
# NOTE: The subscription key is stored in secrets.properties
chat.service.url=https://api-qa.jll.com/csp/chat-service/api/v1/chat/completions
# The URL for the JLL chat service's file upload service 
file.service.url=https://api-qa.jll.com/csp/chat-service/api/v1/files

# -------------------------------------------
# Default Chat Parameters
# -------------------------------------------
default.model=CLAUDE_4_SONNET
default.system.prompt=You are a helpful assistant that analyzes documents.
default.user.prompt=Please summarize this document and highlight the key findings.
default.temperature=0.1
default.max.tokens=4000


# -------------------------------------------
# HTTP Client Configuration
# -------------------------------------------
http.connect.timeout.ms=10000
http.request.timeout.ms=300000

# -------------------------------------------
# File Handling Configuration
# -------------------------------------------
file.max.size.mb=20